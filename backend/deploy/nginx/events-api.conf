# =============================================================================
# events-api.aahaas.dev  →  EventSocial API on localhost:8000
#
# Install:
#   sudo cp deploy/nginx/events-api.conf /etc/nginx/sites-available/events-api
#   sudo ln -s /etc/nginx/sites-available/events-api /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Provision TLS (Let's Encrypt) AFTER nginx is responding on :80:
#   sudo certbot --nginx -d events-api.aahaas.dev
#
# Certbot will automatically rewrite this file in-place to add SSL.
# Re-deploying the API doesn't touch this file — it lives in /etc/nginx/.
# =============================================================================

# --- Plain HTTP: served only long enough for the cert handshake; once
#     certbot runs it'll be replaced with a 301 → HTTPS.
server {
    listen 80;
    listen [::]:80;
    server_name events-api.aahaas.dev;

    # Let certbot's HTTP-01 challenge through before redirect kicks in.
    location /.well-known/acme-challenge/ { root /var/www/letsencrypt; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name events-api.aahaas.dev;

    # Certbot fills in the cert paths automatically. Until it runs, comment
    # out the next four lines and the `listen 443 ssl` directive above.
    # ssl_certificate     /etc/letsencrypt/live/events-api.aahaas.dev/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/events-api.aahaas.dev/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Video uploads are the largest payload; cap matches UPLOAD_MAX_VIDEO_MB.
    client_max_body_size 200M;
    client_body_timeout  120s;

    # Send the real client IP through to Express (it uses `trust proxy = 1`).
    proxy_set_header X-Real-IP        $remote_addr;
    proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Host             $host;
    proxy_http_version 1.1;
    proxy_set_header Connection "";

    # Tight access-log format so log volume stays manageable under load.
    access_log /var/log/nginx/events-api.access.log;
    error_log  /var/log/nginx/events-api.error.log warn;

    # Static uploads — bypass Node, serve straight from disk with long cache.
    # Files have random names so we can mark them immutable.
    location /uploads/ {
        alias /var/www/events-ai/uploads/;
        access_log off;
        add_header Cache-Control "public, max-age=604800, immutable";
        try_files $uri =404;
    }

    # Everything else proxies to the Node app.
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_connect_timeout 5s;
        proxy_read_timeout   60s;
        proxy_send_timeout   60s;
    }
}

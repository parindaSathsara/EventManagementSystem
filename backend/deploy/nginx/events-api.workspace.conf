server {
    listen 80;
    listen [::]:80;

    server_name events-api.aahaas.dev;

    # 200MB matches UPLOAD_MAX_VIDEO_MB in the backend .env.
    client_max_body_size 200M;
    client_body_timeout  120s;

    location / {
        proxy_pass http://aahaas-workspace-1:8011;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout   60s;
    }

    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt/;
        log_not_found off;
    }

    error_log /var/log/nginx/events-api_error.log;
    access_log /var/log/nginx/events-api_access.log;
}
